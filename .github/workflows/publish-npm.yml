name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact package.json version to publish
        required: true
        type: string
      confirm_publish:
        description: Run the publish job after the full release proof passes
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-npm-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish package
    if: github.repository == 'mandarange/Sneakoscope-Codex' && github.ref == 'refs/heads/main' && inputs.confirm_publish == true
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Setup trusted-publishing npm
        shell: bash
        run: |
          npm install --global npm@11.5.1
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Read package metadata
        id: package
        shell: bash
        run: |
          node --input-type=module <<'NODE' >> "$GITHUB_OUTPUT"
          import fs from 'node:fs';

          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          console.log(`name=${pkg.name}`);
          console.log(`version=${pkg.version}`);
          NODE

      - name: Verify requested version
        shell: bash
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
        run: |
          if [ "$REQUESTED_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Requested version does not match package.json." >&2
            exit 1
          fi

      - name: Check npm registry
        id: registry
        shell: bash
        env:
          PACKAGE_NAME: ${{ steps.package.outputs.name }}
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
        run: |
          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version --registry https://registry.npmjs.org/ >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is already published; skipping publish."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is not published yet; continuing."
          fi

      - name: Run publish gates
        if: steps.registry.outputs.published != 'true'
        shell: bash
        env:
          SKS_PUBLISH_AUTH_MODE: trusted-publisher
        run: |
          npm run release:check:full
          node ./dist/scripts/release-check-stamp.js verify
          npm run publish:prep-ignore-scripts

      - name: Publish to npm
        if: steps.registry.outputs.published != 'true'
        env:
          NPM_CONFIG_PROVENANCE: 'true'
        run: npm publish --ignore-scripts --provenance --access public
