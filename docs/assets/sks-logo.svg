<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="Sneakoscope Codex logo">
  <title>Sneakoscope Codex</title>
  <!-- Black tile -->
  <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228" fill="#0A0A0A"/>
  <!-- Outer scope ring (white) -->
  <circle cx="512" cy="512" r="300" fill="none" stroke="#FFFFFF" stroke-width="84"/>
  <!-- Detection sweep arc (the spinning sneakoscope) -->
  <path d="M 512 212 A 300 300 0 0 1 812 512" fill="none" stroke="#0A0A0A" stroke-width="84" stroke-linecap="round"/>
  <!-- Center lens dot -->
  <circle cx="512" cy="512" r="92" fill="#FFFFFF"/>
  <!-- Pupil (trust verified) -->
  <circle cx="512" cy="512" r="34" fill="#0A0A0A"/>
</svg>
